<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spin the Wheel</title>

  <meta name="theme-color" content="#F4F4F4" />
  <link rel="icon" sizes="192x192" href="assets/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/Samsung/stylesheet.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #F4F4F4;
      /* background-image: url(./assets/bg.jpg);
      background-size: cover; */
      /* height: 100%; */
      width: 100%;
      overflow: hidden;
      font-family: 'Samsung Sharp Sans';
    }
    *{
    box-sizing: border-box;
    }

    .layout {
      display: flex;
      flex-direction: column;
      width: 100%;
      align-items: center;
      justify-content: center;
    }

    .left{
      /* flex: 1; */
      /* width: 100%; */
      position: relative;
      width: 280px;
      height: 280px;
    }

    canvas {
        width: 100%;
        height: 100%;
    }

    .sidebar {
      flex: 1;
      /* background-color: #f8f8f8; */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 40px;
    }

    #result {
      font-size: 20px;
      font-weight: bold;
      margin: 20px 0;
      color: #333;
      text-align: center;
    }

    /* button {
      font-size: 20px;
      padding: 10px 25px;
      margin: 10px;
      width: 200px;
    } */


    .frame{
        position: absolute;
        top: 0;right: 0;bottom: 0;left: 0;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .frame img{
        width: 94%;
    }
    .control{
        position: absolute;
        top: 0;right: 0;bottom: 0;left: 0;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    button{
        background: transparent;
        padding: 0;
        margin: 0;border: 0;
        /* position: absolute;
        top: 0;right: 0;bottom: 0;left: 0; */
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    button img{
        width: 15%;
    }
    .popup{
      transition: all ease 300ms;
    }
    .popup.hide{
      opacity: 0;
      pointer-events: none;
    }
  </style>

   <script type="text/javascript" src="js/polyfill.min.js"></script>
   <script type="text/javascript" src="js/jquery-3.1.0.js"></script>
   <script type="text/javascript" src="js/howler.min.js"></script>
   <script type="text/javascript" src="js/Winwheel.min.js"></script>
   <script type="text/javascript" src="js/TweenMax.min.js"></script>
   <script type="text/javascript" src="js/axios.min.js"></script>
</head>
<body>
  <div id="popupResult" class="popup hide" style="position: fixed;width: 100%;height: 100%;top: 0;left: 0;display: flex;align-items: center;justify-content: centerx;flex-flow: column;z-index: 99999;background-color: rgba(0, 0, 0, 0.9)">
    <div style="position: relative;background: #F4F4F4;width: 80%;max-width: 425px;padding: 14px;margin-top: 25px;">
      <div style="width: 100%;" id="hadiahShow">-</div>
      <div>
        <p style="text-align: center;font-size: 14px;color: #296EEA;font-weight: bold;margin: 8px 0 0;">Congratulations! You Got</p>
        <h5 id="hadiahName" style="text-align: center;font-size: 32px;margin: 4px 0 9px">-</h5>
        <button style="width: 80%;margin: 0 auto;" onclick="claimHadiah()" id="claimHadiah">
          <img src="./assets/btn-claim.png" alt="" style="width: 100%;">
        </button>
        <div id="congrats" style="text-align: center;font-size: 16px;;color: #296EEA;font-weight: bold;"></div>
      </div>
    </div>
  </div>

  <div id="popupUlang" class="popup hide" style="position: fixed;width: 100%;height: 100%;top: 0;left: 0;display: flex;align-items: center;justify-content: centerx;flex-flow: column;z-index: 99999;background-color: rgba(0, 0, 0, 0.9)">
    <div style="position: relative;background: #F4F4F4;width: 80%;max-width: 425px;padding: 14px;margin-top: 25px;">
      <!-- <div style="width: 100%;" id="hadiahShow">-</div> -->
      <div>
        <!-- <p style="text-align: center;font-size: 14px;color: #296EEA;font-weight: bold;margin: 8px 0 0;">Congratulations! You Got</p> -->
        <h5 style="text-align: center;font-size: 24px;margin: 4px 0 9px">Putar Ulang Untuk Dapatkan Hadiahmu!</h5>
        <button style="width: 80%;margin: 0 auto;" onclick="startSpin()">
          <img src="./assets/btn-putar3.png" alt="" style="width: 100%;">
        </button>
      </div>
    </div>
  </div>

  <div class="layout" style="padding-top: 0;margin-bottom: .5rem;">
    <div style="width: 70%;margin-bottom: 2rem;"><img src="./assets/get.png" alt="" style="width: 100%;"></div>
    <div class="left" height="1024" style="border: 3px solid #2A2A5C;border-radius: 50%;"  >
      <div style="display: block;width: 100%;">
        <canvas id="canvas" width="1024" height="1024" style="border: 3px solid #2A2A5C;border-radius: 50%;"  data-responsiveMinWidth="180" data-responsiveScaleHeight="true" onClick="startSpin();">
          <p style="color: white" align="center">Sorry, your browser doesn't support canvas. Please try another.</p>
        </canvas>
      </div>

        <div class="notch" style="position: absolute;top: -1.5rem;left: 0;right: 0;width: 60px;margin: 0 auto;"><img src="./assets/notch.png" alt="" style="width: 100%;"></div>
        <div class="control">
            <img src="./assets/flip2.png" alt="" style="width: 30%;">
        </div>
    </div>

    <div style="margin-top: 1.5rem; display: flex; align-items: center; gap: 0.5rem; width: 90%;">
      <input type="checkbox" id="checkShare" style="width: 1.25rem; height: 1.25rem;" />
      <label for="checkShare" style="font-size: 1rem;">
        Sudah posting kegiatan seru di Galaxy Studio ke sosmed
      </label>
    </div>
    <div class="button" style="width: 80%;margin-top: 1.2rem;" id="buttonPutar">
      <button id="spinButton" onclick="startSpin()" style="width: 100%;" disabled>
        <img src="./assets/btn-putar3.png" alt="" style="width: 100%; opacity: 0.5;">
      </button>
    </div>
  </div>


  <!-- <script type="text/javascript" src="js/app.js"></script> -->
  <script type="text/javascript" src="js/app-default-shvr.js"></script>
</body>
</html>
