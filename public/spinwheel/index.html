<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spin the Wheel</title>

  <meta name="theme-color" content="#F4F4F4" />
  <link rel="icon" sizes="192x192" href="assets/icon-192.png" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #F4F4F4;
      /* background-image: url(./assets/bg.jpg);
      background-size: cover; */
      /* height: 100%; */
      width: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }
    *{
    box-sizing: border-box;
    }

    .layout {
      display: flex;
      flex-direction: column;
      width: 100%;
      align-items: center;
      justify-content: center;
    }

    .left{
      /* flex: 1; */
      /* width: 100%; */
      position: relative;
      width: 280px;
      height: 280px;
    }

    canvas {
        width: 100%;
        height: 100%;
    }

    .sidebar {
      flex: 1;
      /* background-color: #f8f8f8; */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 40px;
    }

    #result {
      font-size: 20px;
      font-weight: bold;
      margin: 20px 0;
      color: #333;
      text-align: center;
    }

    /* button {
      font-size: 20px;
      padding: 10px 25px;
      margin: 10px;
      width: 200px;
    } */


    .frame{
        position: absolute;
        top: 0;right: 0;bottom: 0;left: 0;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .frame img{
        width: 94%;
    }
    .control{
        position: absolute;
        top: 0;right: 0;bottom: 0;left: 0;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    button{
        background: transparent;
        padding: 0;
        margin: 0;border: 0;
        /* position: absolute;
        top: 0;right: 0;bottom: 0;left: 0; */
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    button img{
        width: 15%;
    }
  </style>
</head>
<body>
  <div class="layout" style="padding-top: 1rem;margin-bottom: .5rem;">
    <div style="width: 70%;margin-bottom: 2rem;"><img src="./assets/get.png" alt="" style="width: 100%;"></div>
    <div class="left">
        <canvas id="wheelCanvas"></canvas>

        <div class="notch" style="position: absolute;top: -1.5rem;left: 0;right: 0;width: 60px;margin: 0 auto;"><img src="./assets/notch.png" alt="" style="width: 100%;"></div>
        <div class="control">
            <img src="./assets/flip.png" alt="" style="width: 30%;">
        </div>
    </div>
    <div class="button" style="width: 70%;margin-top: 2rem;">
      <button id="spinBtn" style="width: 100%;">
        <img src="./assets/btn-putar3.png" alt="" style="width: 100%;">
      </button>
      <div id="resetBtn" style="display: none;">reset</div>
    </div>
    <div id="result"></div>
  </div>

  <audio id="tickSound" src="assets/tick.mp3" preload="auto"></audio>
  <script src="wheel.js"></script>
</body>
</html>
